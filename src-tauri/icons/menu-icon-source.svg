<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Fan icon: 3 symmetric curved blades + center hub for macOS menu bar template -->
  <g fill="black">
    <!-- Center hub -->
    <circle cx="8" cy="8" r="1.6"/>
    <!-- 3 blades with 120° rotational symmetry, each is the same shape rotated -->
    <!-- Blade 1: pointing up -->
    <path d="M7.2 6.4 C6.2 4.2, 7.5 1.8, 9.2 1.5 C10.5 1.3, 11 3, 10.2 4.8 C9.5 6.2, 8.2 6.8, 7.2 6.4 Z"/>
    <!-- Blade 2: pointing lower-left (rotated 120°) -->
    <path d="M6.8 9 C5 10.2, 2.5 10, 1.8 8.5 C1.2 7.3, 2.8 6.2, 4.6 6 C6.2 5.8, 7.2 7.5, 6.8 9 Z"/>
    <!-- Blade 3: pointing lower-right (rotated 240°) -->
    <path d="M9.4 9 C10.8 10.8, 12.2 13, 11 14 C10 14.8, 8.5 13.2, 8 11.5 C7.5 10, 8.5 8.8, 9.4 9 Z"/>
  </g>
</svg>
